#!/usr/bin/env bash
# =============================================================================
# Zeta Voice — Nginx Config
# Place at: /etc/nginx/sites-available/zeta-voice
# Then: sudo ln -s /etc/nginx/sites-available/zeta-voice /etc/nginx/sites-enabled/
# =============================================================================

server {
    listen 80;
    server_name voice.kontorolabs.com;                # Replace _ with your domain or EC2 public DNS
    client_max_body_size 10M;                         # Allow up to 10MB file uploads

    # ── Main app ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Admin app (protect this with IP allowlist in production) ─────────────
    location /admin {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
