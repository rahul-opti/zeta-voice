services:
  postgres:
    image: postgres:16-alpine
    container_name: carriage-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: carriage-azurite
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: carriage-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - model_cache:/app/src/carriage_services/question_classification/model
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    command: uvicorn carriage_services.main:app --host 0.0.0.0 --port 8000

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: carriage-admin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    command: uvicorn carriage_services.main:admin_app --host 0.0.0.0 --port 8001

volumes:
  postgres_data:
  azurite_data:
  model_cache:
